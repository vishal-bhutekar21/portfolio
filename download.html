<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic meta tags for browser compatibility and responsiveness -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download - Vishal Bhutekar</title>

  <!-- Google Fonts for clean modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Dark background */
    body {
      min-height: 100vh;
      background-color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #e2e8f0;
      padding: 1rem;
    }

    /* ===== Card Container ===== */
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* Icon area at the top of the card */
    .icon-wrapper {
      width: 64px;
      height: 64px;
      background-color: #0f172a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.75rem;
    }

    /* Main heading */
    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }

    /* Sub-heading / description */
    .card > p {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    /* ===== File List ===== */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    /* ===== File Row ===== */
    /* Each row shows file info on the left and a download button on the right */
    .file-row {
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-align: left;
    }

    /* File icon */
    .file-row .file-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    /* File name & meta info takes up remaining space */
    .file-row .file-details {
      flex: 1;
      min-width: 0;
    }

    /* File name text */
    .file-row .file-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      word-break: break-all;
    }

    /* File type hint */
    .file-row .file-meta {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 2px;
    }

    /* ===== Download Button ===== */
    .btn-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background-color: #22c55e;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      padding: 0.55rem 1.1rem;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background-color 0.2s ease, transform 0.1s ease;
      cursor: pointer;
    }

    /* Hover state — slightly darker green */
    .btn-download:hover {
      background-color: #16a34a;
    }

    /* Active / click state — tiny scale-down for tactile feel */
    .btn-download:active {
      transform: scale(0.97);
    }

    /* ===== Back Link ===== */
    .back-link {
      margin-top: 1.25rem;
      font-size: 0.875rem;
    }

    .back-link a {
      color: #60a5fa;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    /* ===== Footer note ===== */
    .footer-note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #475569;
    }

    /* ===== Mobile Responsiveness ===== */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.25rem;
      }

      .card h1 {
        font-size: 1.25rem;
      }

      .file-row {
        flex-wrap: wrap;
      }

      .btn-download {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- ===== Main Download Card ===== -->
  <div class="card">

    <!-- Archive icon at the top -->
    <div class="icon-wrapper" aria-hidden="true">📦</div>

    <!-- Page title -->
    <h1>India Skills Downloads</h1>

    <!-- Brief description -->
    <p>All files from the India Skills competition are listed below. Click <strong style="color:#e2e8f0;">Download</strong> next to any file to save it to your device.</p>

    <!-- ===== File List (populated by JavaScript below) ===== -->
    <div class="file-list" id="file-list"></div>

    <!-- Link back to the main portfolio page -->
    <p class="back-link">
      <a href="/">← Back to Portfolio</a>
    </p>

  </div>

  <!-- Footer note -->
  <p class="footer-note">
    Vishal Bhutekar &nbsp;|&nbsp; Portfolio
  </p>

  <script>
    /**
     * India Skills file list.
     * To add a new file, simply append an object to this array:
     *   { name: "FileName.ext", size: "X KB" }
     * The icon and file type label are determined automatically from the extension.
     */
    var FILES = [
      { name: "ApiDocPart.txt",                   size: "14 KB"  },
      { name: "WinformsPart.txt",                 size: "24 KB"  },
      { name: "Session_01_Vishal_Bhutekar.zip",   size: "4.1 MB" }
    ];

    /** HTML-escapes a string to prevent XSS when injecting into innerHTML. */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /** Returns an emoji icon and a human-readable label for a given filename. */
    function fileTypeInfo(filename) {
      var ext = filename.split('.').pop().toLowerCase();
      var map = {
        txt:  { icon: "📄", label: "Text Document" },
        pdf:  { icon: "📕", label: "PDF Document"  },
        zip:  { icon: "🗜️", label: "ZIP Archive"   },
        rar:  { icon: "🗜️", label: "RAR Archive"   },
        "7z": { icon: "🗜️", label: "7-Zip Archive" },
        doc:  { icon: "📝", label: "Word Document"  },
        docx: { icon: "📝", label: "Word Document"  },
        xls:  { icon: "📊", label: "Excel Spreadsheet" },
        xlsx: { icon: "📊", label: "Excel Spreadsheet" },
        ppt:  { icon: "📽️", label: "PowerPoint Presentation" },
        pptx: { icon: "📽️", label: "PowerPoint Presentation" },
        png:  { icon: "🖼️", label: "PNG Image"     },
        jpg:  { icon: "🖼️", label: "JPEG Image"    },
        jpeg: { icon: "🖼️", label: "JPEG Image"    },
        gif:  { icon: "🖼️", label: "GIF Image"     },
        mp4:  { icon: "🎬", label: "MP4 Video"     },
        mp3:  { icon: "🎵", label: "MP3 Audio"     },
        json: { icon: "📄", label: "JSON File"     },
        xml:  { icon: "📄", label: "XML File"      },
        csv:  { icon: "📊", label: "CSV File"      }
      };
      return map[ext] || { icon: "📎", label: ext.toUpperCase() + " File" };
    }

    /** Renders all file rows into #file-list. */
    function renderFileList() {
      var container = document.getElementById('file-list');
      FILES.forEach(function(file) {
        var info = fileTypeInfo(file.name);
        var meta = info.label + (file.size ? " · " + file.size : "");

        var row = document.createElement('div');
        row.className = 'file-row';
        row.innerHTML =
          '<span class="file-icon" aria-hidden="true">' + info.icon + '</span>' +
          '<div class="file-details">' +
            '<div class="file-name">' + esc(file.name) + '</div>' +
            '<div class="file-meta">' + esc(meta) + '</div>' +
          '</div>' +
          '<a href="/india-skills-download/' + encodeURIComponent(file.name) + '"' +
             ' download="' + esc(file.name) + '"' +
             ' class="btn-download"' +
             ' aria-label="Download ' + esc(file.name) + '">' +
            '⬇️ Download' +
          '</a>';

        container.appendChild(row);
      });
    }

    renderFileList();
  </script>

</body>
</html>
